# 代码生成器配置
forge:
  generator:
    # 默认作者
    author: Forge Generator
    # 默认包名
    package-name: com.mdframe.forge.plugin
    # 默认模块名
    module-name: system
    # 默认模板引擎：VELOCITY/FREEMARKER/AI
    template-engine: VELOCITY
    # 是否自动移除表前缀
    auto-remove-prefix: true
    # 表前缀（生成时自动移除）
    table-prefix: sys_,gen_
    # 生成基础路径
    base-path: ${user.dir}
