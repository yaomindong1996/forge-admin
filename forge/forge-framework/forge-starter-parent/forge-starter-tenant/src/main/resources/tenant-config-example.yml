# ====================================================================
# 多租户配置示例
# ====================================================================

forge:
  tenant:
    # 是否启用多租户功能（默认：true）
    enabled: true
    
    # 租户字段名称（默认：tenant_id）
    # 所有需要租户隔离的表都应该有这个字段
    column: tenant_id
    
    # 严格模式（默认：false）
    # true: 当获取不到租户ID时抛出异常
    # false: 当获取不到租户ID时记录警告日志
    strict-mode: false
    
    # 自动检测租户字段（默认：true）
    # 启用后，应用启动时会自动扫描数据库表结构
    # 检测哪些表包含租户字段，不包含的表自动跳过租户过滤
    # 推荐开启，可以省去手动配置 ignore-tables
    auto-detect-tenant-column: true
    
    # 忽略租户的表名列表（仅在 auto-detect-tenant-column=false 时需要配置）
    # 这些表不会自动添加租户条件
    # 如果开启了自动检测，此项配置可选，作为额外的忽略表
    ignore-tables:
      # 以下配置仅作为示例，开启自动检测后无需配置
      
      # 租户表本身
      # - sys_tenant
      
      # 系统配置相关表（通常为全局配置）
      # - sys_config
      # - sys_dict_type
      # - sys_dict_data
    
    # 忽略租户的SQL关键字（可选）
    # 包含这些关键字的SQL不会添加租户条件
    ignore-sql-keywords:
      # - COUNT(*)
      # - DISTINCT

# ====================================================================
# 配置说明
# ====================================================================
#
# 1. 自动检测模式（推荐）
#    auto-detect-tenant-column: true
#    - 应用启动时自动扫描数据库表结构
#    - 检测哪些表包含 tenant_id 字段
#    - 不包含的表自动跳过租户过滤
#    - 无需手动配置 ignore-tables
#
# 2. 手动配置模式
#    auto-detect-tenant-column: false
#    - 需要在 ignore-tables 中手动配置忽略的表
#    - 适用于对启动性能有极致要求的场景
#
# 3. 混合模式
#    auto-detect-tenant-column: true
#    ignore-tables:
#      - some_special_table
#    - 自动检测 + 手动配置额外忽略的表
#    - 手动配置的表会优先处理
# ====================================================================